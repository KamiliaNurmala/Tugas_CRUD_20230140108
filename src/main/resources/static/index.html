<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aplikasi CRUD KTP</title>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>

    <style>
        body { font-family: Arial, sans-serif; background-color: #f4f4f4; padding: 20px; }
        .container { background: #fff; padding: 20px 30px; max-width: 800px; margin: auto; border-radius: 8px; box-shadow: 0 0 10px rgba(0,0,0,0.1); }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; }
        input[type="text"], input[type="date"], select, textarea { width: 100%; padding: 8px; box-sizing: border-box; }
        button { padding: 10px 15px; margin-right: 5px; cursor: pointer; background-color: #28a745; color: white; border: none; border-radius: 4px; }
        #btnReset { background-color: #6c757d; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        table, th, td { border: 1px solid #ddd; }
        th, td { padding: 10px; text-align: left; }
        th { background-color: #007bff; color: white; }
        .btn-edit { background-color: #ffc107; color: black; }
        .btn-delete { background-color: #dc3545; color: white; }
        #feedbackMessage { padding: 10px; margin-bottom: 15px; border-radius: 5px; font-weight: bold; }
        .success { background-color: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
        .error { background-color: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }
    </style>
</head>
<body>

<div class="container">
    <h2>Aplikasi Pengelolaan Data KTP</h2>

    <div id="feedbackMessage" style="display: none;"></div>

    <form id="ktpForm">
        <input type="hidden" id="ktpId">

        <div class="form-group">
            <label for="nomorKtp">Nomor KTP:</label>
            <input type="text" id="nomorKtp" required>
        </div>
        <div class="form-group">
            <label for="namaLengkap">Nama Lengkap:</label>
            <input type="text" id="namaLengkap" required>
        </div>
        <div class="form-group">
            <label for="alamat">Alamat:</label>
            <textarea id="alamat" required></textarea>
        </div>
        <div class="form-group">
            <label for="tanggalLahir">Tanggal Lahir:</label>
            <input type="date" id="tanggalLahir" required>
        </div>
        <div class="form-group">
            <label for="jenisKelamin">Jenis Kelamin:</label>
            <select id="jenisKelamin" required>
                <option value="">-- Pilih --</option>
                <option value="Laki-laki">Laki-laki</option>
                <option value="Perempuan">Perempuan</option>
            </select>
        </div>

        <button type="submit" id="btnSubmit">Simpan Data</button>
        <button type="button" id="btnReset" onclick="resetForm()">Batal</button>
    </form>

    <hr>

    <h3>Daftar KTP</h3>
    <table id="ktpTable">
        <thead>
        <tr>
            <th>No</th>
            <th>Nomor KTP</th>
            <th>Nama Lengkap</th>
            <th>Alamat</th>
            <th>Tanggal Lahir</th>
            <th>Jenis Kelamin</th>
            <th>Aksi</th>
        </tr>
        </thead>
        <tbody>
        </tbody>
    </table>
</div>

<script>
    $(document).ready(function() {
        // Muat data saat halaman pertama kali dibuka
        loadKtpData();

        // Event Submit Form (Untuk POST dan PUT)
        $('#ktpForm').on('submit', function(e) {
            e.preventDefault(); // Mencegah halaman refresh

            let ktpId = $('#ktpId').val();
            let url = ktpId ? `/ktp/${ktpId}` : '/ktp';
            let type = ktpId ? 'PUT' : 'POST';

            // Mengambil data dari form
            let dataKtp = {
                nomorKtp: $('#nomorKtp').val(),
                namaLengkap: $('#namaLengkap').val(),
                alamat: $('#alamat').val(),
                tanggalLahir: $('#tanggalLahir').val(),
                jenisKelamin: $('#jenisKelamin').val()
            };

            // Mengirim request Ajax
            $.ajax({
                url: url,
                type: type,
                contentType: 'application/json',
                data: JSON.stringify(dataKtp),
                success: function(response) {
                    showFeedback(ktpId ? 'Data KTP berhasil diperbarui!' : 'Data KTP berhasil ditambahkan!', 'success');
                    resetForm();
                    loadKtpData(); // Refresh tabel data
                },
                error: function(xhr) {
                    // Menampilkan pesan error dari backend
                    let errorMessage = xhr.responseJSON && xhr.responseJSON.error ? xhr.responseJSON.error : 'Terjadi kesalahan pada server.';
                    showFeedback('Gagal: ' + errorMessage, 'error');
                }
            });
        });
    });

    // GET: Mengambil data dari API dan menampilkan ke tabel
    function loadKtpData() {
        $.ajax({
            url: '/ktp',
            type: 'GET',
            success: function(response) {
                let tbody = $('#ktpTable tbody');
                tbody.empty();

                $.each(response, function(index, ktp) {
                    let row = `<tr>
                        <td>${index + 1}</td>
                        <td>${ktp.nomorKtp}</td>
                        <td>${ktp.namaLengkap}</td>
                        <td>${ktp.alamat}</td>
                        <td>${ktp.tanggalLahir}</td>
                        <td>${ktp.jenisKelamin}</td>
                        <td>
                            <button class="btn-edit" onclick="editKtp(${ktp.id})">Edit</button>
                            <button class="btn-delete" onclick="deleteKtp(${ktp.id})">Hapus</button>
                        </td>
                    </tr>`;
                    tbody.append(row);
                });
            },
            error: function(xhr) {
                showFeedback('Gagal memuat data KTP.', 'error');
            }
        });
    }

    // GET {id}: Mengambil data spesifik untuk di edit
    window.editKtp = function(id) {
        $.ajax({
            url: `/ktp/${id}`,
            type: 'GET',
            success: function(ktp) {
                $('#ktpId').val(ktp.id);
                $('#nomorKtp').val(ktp.nomorKtp);
                $('#namaLengkap').val(ktp.namaLengkap);
                $('#alamat').val(ktp.alamat);
                $('#tanggalLahir').val(ktp.tanggalLahir);
                $('#jenisKelamin').val(ktp.jenisKelamin);

                $('#btnSubmit').text('Update Data');
                window.scrollTo(0, 0);
            },
            error: function() {
                showFeedback('Data tidak ditemukan.', 'error');
            }
        });
    };

    // DELETE: Menghapus data
    window.deleteKtp = function(id) {
        if (confirm('Apakah Anda yakin ingin menghapus data KTP ini?')) {
            $.ajax({
                url: `/ktp/${id}`,
                type: 'DELETE',
                success: function() {
                    showFeedback('Data KTP berhasil dihapus!', 'success');
                    loadKtpData();
                },
                error: function() {
                    showFeedback('Gagal menghapus data.', 'error');
                }
            });
        }
    };

    // Fungsi utilitas
    window.resetForm = function() {
        $('#ktpForm')[0].reset();
        $('#ktpId').val('');
        $('#btnSubmit').text('Simpan Data');
    };

    function showFeedback(message, type) {
        let feedbackDiv = $('#feedbackMessage');
        feedbackDiv.removeClass('success error').addClass(type).text(message).fadeIn();
        setTimeout(function() {
            feedbackDiv.fadeOut();
        }, 4000);
    }
</script>
</body>
</html>
