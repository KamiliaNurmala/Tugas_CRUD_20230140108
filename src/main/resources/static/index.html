<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aplikasi CRUD KTP</title>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            min-height: 100vh;
            margin: 0;
            padding: 40px 20px;
            color: #333;
        }

        .container {
            background: #ffffff;
            padding: 40px;
            max-width: 900px;
            margin: auto;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }

        h2 {
            text-align: center;
            color: #2c3e50;
            margin-top: 0;
            margin-bottom: 30px;
            font-weight: 600;
        }

        h3 {
            color: #2c3e50;
            margin-top: 40px;
            margin-bottom: 20px;
            border-bottom: 2px solid #edf2f7;
            padding-bottom: 10px;
        }

        .form-group { margin-bottom: 20px; }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
            color: #4a5568;
        }

        input[type="text"], input[type="date"], select, textarea {
            width: 100%;
            padding: 12px 15px;
            border: 1px solid #cbd5e0;
            border-radius: 6px;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
            font-size: 14px;
            transition: all 0.3s ease;
            background-color: #f8fafc;
        }

        input[type="text"]:focus, input[type="date"]:focus, select:focus, textarea:focus {
            border-color: #3182ce;
            outline: none;
            box-shadow: 0 0 0 3px rgba(49, 130, 206, 0.2);
            background-color: #ffffff;
        }

        textarea { resize: vertical; min-height: 80px; }

        button {
            padding: 12px 24px;
            margin-right: 10px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            background-color: #3182ce;
            color: white;
            border: none;
            border-radius: 6px;
            transition: background-color 0.3s, transform 0.1s;
        }

        button:hover { background-color: #2b6cb0; }
        button:active { transform: translateY(1px); }

        #btnReset { background-color: #a0aec0; }
        #btnReset:hover { background-color: #718096; }

        /* Style untuk Tabel */
        .table-responsive {
            overflow-x: auto;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }

        table {
            width: 100%;
            border-collapse: collapse;
            background-color: #ffffff;
            overflow: hidden;
        }

        th, td {
            padding: 15px;
            text-align: left;
            border-bottom: 1px solid #edf2f7;
        }

        th {
            background-color: #2d3748;
            color: #ffffff;
            font-weight: 500;
            white-space: nowrap;
        }

        tr:hover { background-color: #f7fafc; }

        /* Tombol Aksi di Tabel */
        .btn-edit { background-color: #d69e2e; padding: 8px 12px; font-size: 13px; }
        .btn-edit:hover { background-color: #b7791f; }

        .btn-delete { background-color: #e53e3e; padding: 8px 12px; font-size: 13px; margin-left: 5px; margin-right: 0;}
        .btn-delete:hover { background-color: #c53030; }

        /* Notifikasi Feedback */
        #feedbackMessage {
            padding: 15px;
            margin-bottom: 25px;
            border-radius: 6px;
            font-weight: 500;
            text-align: center;
        }
        .success { background-color: #c6f6d5; color: #22543d; border: 1px solid #9ae6b4; }
        .error { background-color: #fed7d7; color: #742a2a; border: 1px solid #feb2b2; }
    </style>
</head>
<body>

<div class="container">
    <h2>Aplikasi Pengelolaan Data KTP</h2>

    <div id="feedbackMessage" style="display: none;"></div>

    <form id="ktpForm">
        <input type="hidden" id="ktpId">

        <div class="form-group">
            <label for="nomorKtp">Nomor KTP</label>
            <input type="text" id="nomorKtp" placeholder="Masukkan 16 digit NIK" required>
        </div>
        <div class="form-group">
            <label for="namaLengkap">Nama Lengkap</label>
            <input type="text" id="namaLengkap" placeholder="Masukkan nama sesuai KTP" required>
        </div>
        <div class="form-group">
            <label for="alamat">Alamat Lengkap</label>
            <textarea id="alamat" placeholder="Masukkan jalan, RT/RW, desa, dll" required></textarea>
        </div>
        <div class="form-group">
            <label for="tanggalLahir">Tanggal Lahir</label>
            <input type="date" id="tanggalLahir" required>
        </div>
        <div class="form-group">
            <label for="jenisKelamin">Jenis Kelamin</label>
            <select id="jenisKelamin" required>
                <option value="">-- Pilih Jenis Kelamin --</option>
                <option value="Laki-laki">Laki-laki</option>
                <option value="Perempuan">Perempuan</option>
            </select>
        </div>

        <button type="submit" id="btnSubmit">Simpan Data</button>
        <button type="button" id="btnReset" onclick="resetForm()">Batal</button>
    </form>

    <h3>Daftar KTP Tersimpan</h3>
    <div class="table-responsive">
        <table id="ktpTable">
            <thead>
            <tr>
                <th>No</th>
                <th>Nomor KTP</th>
                <th>Nama Lengkap</th>
                <th>Alamat</th>
                <th>Tanggal Lahir</th>
                <th>Jenis Kelamin</th>
                <th>Aksi</th>
            </tr>
            </thead>
            <tbody>
            </tbody>
        </table>
    </div>
</div>

<script>
    $(document).ready(function() {
        loadKtpData();

        $('#ktpForm').on('submit', function(e) {
            e.preventDefault();

            let ktpId = $('#ktpId').val();
            let url = ktpId ? `/ktp/${ktpId}` : '/ktp';
            let type = ktpId ? 'PUT' : 'POST';

            let dataKtp = {
                nomorKtp: $('#nomorKtp').val(),
                namaLengkap: $('#namaLengkap').val(),
                alamat: $('#alamat').val(),
                tanggalLahir: $('#tanggalLahir').val(),
                jenisKelamin: $('#jenisKelamin').val()
            };

            $.ajax({
                url: url,
                type: type,
                contentType: 'application/json',
                data: JSON.stringify(dataKtp),
                success: function(response) {
                    showFeedback(ktpId ? 'Data KTP berhasil diperbarui!' : 'Data KTP berhasil ditambahkan!', 'success');
                    resetForm();
                    loadKtpData();
                },
                error: function(xhr) {
                    let errorMessage = xhr.responseJSON && xhr.responseJSON.error ? xhr.responseJSON.error : 'Terjadi kesalahan pada server.';
                    showFeedback('Gagal: ' + errorMessage, 'error');
                }
            });
        });
    });

    function loadKtpData() {
        $.ajax({
            url: '/ktp',
            type: 'GET',
            success: function(response) {
                let tbody = $('#ktpTable tbody');
                tbody.empty();

                $.each(response, function(index, ktp) {
                    let row = `<tr>
                        <td>${index + 1}</td>
                        <td><strong>${ktp.nomorKtp}</strong></td>
                        <td>${ktp.namaLengkap}</td>
                        <td>${ktp.alamat}</td>
                        <td>${ktp.tanggalLahir}</td>
                        <td>${ktp.jenisKelamin}</td>
                        <td>
                            <button class="btn-edit" onclick="editKtp(${ktp.id})">Edit</button>
                            <button class="btn-delete" onclick="deleteKtp(${ktp.id})">Hapus</button>
                        </td>
                    </tr>`;
                    tbody.append(row);
                });
            },
            error: function(xhr) {
                showFeedback('Gagal memuat data KTP.', 'error');
            }
        });
    }

    window.editKtp = function(id) {
        $.ajax({
            url: `/ktp/${id}`,
            type: 'GET',
            success: function(ktp) {
                $('#ktpId').val(ktp.id);
                $('#nomorKtp').val(ktp.nomorKtp);
                $('#namaLengkap').val(ktp.namaLengkap);
                $('#alamat').val(ktp.alamat);
                $('#tanggalLahir').val(ktp.tanggalLahir);
                $('#jenisKelamin').val(ktp.jenisKelamin);

                $('#btnSubmit').text('Update Data');
                window.scrollTo({ top: 0, behavior: 'smooth' });
            },
            error: function() {
                showFeedback('Data tidak ditemukan.', 'error');
            }
        });
    };

    window.deleteKtp = function(id) {
        if (confirm('Apakah Anda yakin ingin menghapus data KTP ini?')) {
            $.ajax({
                url: `/ktp/${id}`,
                type: 'DELETE',
                success: function() {
                    showFeedback('Data KTP berhasil dihapus!', 'success');
                    loadKtpData();
                },
                error: function() {
                    showFeedback('Gagal menghapus data.', 'error');
                }
            });
        }
    };

    window.resetForm = function() {
        $('#ktpForm')[0].reset();
        $('#ktpId').val('');
        $('#btnSubmit').text('Simpan Data');
    };

    function showFeedback(message, type) {
        let feedbackDiv = $('#feedbackMessage');
        feedbackDiv.removeClass('success error').addClass(type).text(message).fadeIn();
        setTimeout(function() {
            feedbackDiv.fadeOut();
        }, 4000);
    }
</script>
</body>
</html>
